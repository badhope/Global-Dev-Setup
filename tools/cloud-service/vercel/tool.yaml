# Vercel
name: vercel
category: cloud-service
description: "Vercel - Frontend cloud platform and serverless deployment"
version: "latest"
latest_version: "latest"
homepage: "https://vercel.com/"
documentation: "https://vercel.com/docs"
license: "Proprietary"
author: "Vercel"

tags:
  - vercel
  - serverless
  - frontend
  - deployment
  - hosting
  - nextjs
  - static-site

supported_os:
  - linux
  - macos
  - windows

installation_sources:
  - type: npm
    os: [all]
    package_name: vercel
    description: "Vercel CLI"
    priority: 1
    command: |
      npm install -g vercel

  - type: web
    os: [all]
    description: "Web dashboard"
    priority: 1
    command: |
      # Access via web browser
      echo "Visit https://vercel.com to sign up"

optional_tools:
  - name: git
    description: "Git for version control"
    recommended: true
  - name: nodejs
    description: "Node.js runtime"
    recommended: true

verify_commands:
  - "vercel --version"

compatible_with:
  - nextjs
  - react
  - vue
  - nodejs
