# Angular Framework
name: angular
category: framework
description: "Angular - platform for building mobile and desktop applications"
version: "17"
latest_version: "17"
homepage: "https://angular.io/"
documentation: "https://angular.io/docs"
license: "MIT"
author: "Google"

tags:
  - angular
  - frontend
  - typescript
  - enterprise
  - spa

supported_os:
  - linux
  - macos
  - windows

installation_sources:
  - type: npm
    os: [all]
    package_name: "@angular/cli"
    description: "npm installation"
    priority: 1
    command: |
      npm install -g @angular/cli

  - type: ng-new
    os: [all]
    description: "Create Angular app"
    priority: 1
    command: |
      ng new my-app

optional_tools:
  - name: typescript
    description: "TypeScript"
    recommended: true

environment_vars:
  NODE_ENV: "development"

post_install:
  - "npm install"

verify_commands:
  - "ng version"

compatible_with:
  - nodejs
  - typescript

system_requirements:
  disk_space: "1GB"
  memory: "2GB minimum"
