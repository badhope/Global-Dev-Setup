# Supabase
name: supabase
category: database
description: "Supabase - Open source Firebase alternative with Postgres database"
version: "latest"
latest_version: "latest"
homepage: "https://supabase.com/"
documentation: "https://supabase.com/docs"
license: "Apache 2.0"
author: "Supabase"

tags:
  - supabase
  - database
  - postgresql
  - backend-as-a-service
  - baas
  - firebase-alternative
  - realtime

supported_os:
  - linux
  - macos
  - windows

installation_sources:
  - type: npm
    os: [all]
    package_name: supabase
    description: "Supabase CLI"
    priority: 1
    command: |
      npm install -g supabase

  - type: web
    os: [all]
    description: "Web dashboard"
    priority: 1
    command: |
      # Access via web browser
      echo "Visit https://supabase.com to create project"

  - type: docker
    os: [all]
    description: "Self-hosted with Docker"
    priority: 2
    command: |
      docker run -d -p 54321:54321 -p 3000:3000 supabase/postgres

optional_tools:
  - name: postgresql
    description: "PostgreSQL client"
    recommended: true
  - name: docker
    description: "Docker for self-hosting"
    recommended: false

verify_commands:
  - "supabase --version"

compatible_with:
  - postgresql
  - docker
  - nodejs
  - python
