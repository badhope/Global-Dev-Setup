# Global-Dev-Setup 镜像源配置文件
# 为中国用户优化的下载镜像源

default_regions:
  - cn  # 中国
  - global  # 全球

default_mirrors:
  cn:
    name: "中国镜像"
    description: "适合中国用户的下载源"
    priority: 10
  
  global:
    name: "官方源"
    description: "官方下载源"
    priority: 1

# 包管理器镜像
package_managers:
  apt:
    cn:
      mirrors:
        - url: "https://mirrors.aliyun.com/ubuntu"
          name: "阿里云"
          priority: 1
        - url: "https://mirrors.tuna.tsinghua.edu.cn/ubuntu"
          name: "清华镜像"
          priority: 2
        - url: "https://mirrors.ustc.edu.cn/ubuntu"
          name: "中科大镜像"
          priority: 3
      key_mirrors:
        - "https://mirrors.aliyun.com"
    
    global:
      mirrors:
        - url: "http://archive.ubuntu.com/ubuntu"
          name: "官方源"
          priority: 1

  pip:
    cn:
      mirrors:
        - url: "https://pypi.tuna.tsinghua.edu.cn/simple"
          name: "清华镜像"
          priority: 1
        - url: "https://pypi.douban.com/simple"
          name: "豆瓣镜像"
          priority: 2
        - url: "https://mirrors.aliyun.com/pypi/simple"
          name: "阿里云镜像"
          priority: 3
        - url: "https://pypi.mirrors.ustc.edu.cn/simple"
          name: "中科大镜像"
          priority: 4
    
    global:
      mirrors:
        - url: "https://pypi.org/simple"
          name: "官方源"
          priority: 1

  npm:
    cn:
      mirrors:
        - url: "https://registry.npmmirror.com"
          name: "淘宝 NPM 镜像"
          priority: 1
        - url: "https://registry.npm.taobao.org"
          name: "旧淘宝镜像"
          priority: 2
        - url: "https://mirrors.tuna.tsinghua.edu.cn/npm"
          name: "清华 NPM 镜像"
          priority: 3
    
    global:
      mirrors:
        - url: "https://registry.npmjs.org"
          name: "官方源"
          priority: 1

  docker:
    cn:
      mirrors:
        - url: "https://docker.mirrors.ustc.edu.cn"
          name: "中科大 Docker 镜像"
          priority: 1
        - url: "https://dockerproxy.com"
          name: "Docker 代理"
          priority: 2
        - url: "https://hub-mirror.c.163.com"
          name: "网易镜像"
          priority: 3
        - url: "https://mirror.ccs.tencentyun.com"
          name: "腾讯镜像"
          priority: 4
    
    global:
      mirrors:
        - url: "https://registry-1.docker.io"
          name: "官方源"
          priority: 1

  go:
    cn:
      mirrors:
        - url: "https://goproxy.cn"
          name: "GOPROXY.CN"
          priority: 1
        - url: "https://goproxy.io"
          name: "GOPROXY.IO"
          priority: 2
        - url: "https://mirrors.aliyun.com/goproxy"
          name: "阿里云 Go 代理"
          priority: 3
    
    global:
      mirrors:
        - url: "https://proxy.golang.org"
          name: "官方源"
          priority: 1

  rust:
    cn:
      crates_io_mirrors:
        - url: "https://mirrors.tuna.tsinghua.edu.cn/git/crates.io-index"
          name: "清华 crates.io"
          priority: 1
      rustup_mirrors:
        - url: "https://mirrors.tuna.tsinghua.edu.cn/rustup"
          name: "清华 rustup"
          priority: 1
    
    global:
      crates_io_mirrors:
        - url: "https://github.com/rust-lang/crates.io-index"
          name: "官方源"
          priority: 1
      rustup_mirrors:
        - url: "https://static.rust-lang.org"
          name: "官方源"
          priority: 1

  maven:
    cn:
      mirrors:
        - url: "https://maven.aliyun.com/repository/public"
          name: "阿里云 Maven 公共仓库"
          priority: 1
        - url: "https://maven.aliyun.com/repository/central"
          name: "阿里云中央仓库镜像"
          priority: 2
        - url: "https://maven.aliyun.com/repository/spring"
          name: "阿里云 Spring 仓库"
          priority: 3
        - url: "https://mirrors.tuna.tsinghua.edu.cn/maven"
          name: "清华 Maven 镜像"
          priority: 4
    
    global:
      mirrors:
        - url: "https://repo.maven.apache.org/maven2"
          name: "官方源"
          priority: 1

  apt-k8s:
    cn:
      mirrors:
        - url: "https://mirrors.aliyun.com/kubernetes/apt"
          name: "阿里云 Kubernetes 镜像"
          priority: 1
    
    global:
      mirrors:
        - url: "https://apt.kubernetes.io"
          name: "官方源"
          priority: 1

# 大模型镜像
