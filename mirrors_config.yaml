          priority: 1

  nodejs:
    cn:
      mirrors:
        - url: "https://npmmirror.com/mirrors/node"
          name: "淘宝镜像"
          priority: 1
        - url: "https://mirrors.tuna.tsinghua.edu.cn/nodejs-release"
          name: "清华镜像"
          priority: 2
    
    global:
      mirrors:
        - url: "https://nodejs.org/dist"
          name: "官方源"
          priority: 1

  go:
    cn:
      mirrors:
        - url: "https://mirrors.aliyun.com/golang"
          name: "阿里云镜像"
          priority: 1
        - url: "https://go.dev/dl"
          name: "Go 官网 (CDN 加速)"
          priority: 2
    
    global:
      mirrors:
        - url: "https://go.dev/dl"
          name: "官方源"
          priority: 1

  java:
    cn:
      mirrors:
        - url: "https://mirrors.tuna.tsinghua.edu.cn/Adoptium"
          name: "清华 Adoptium 镜像"
          priority: 1
        - url: "https://mirrors.huaweicloud.com/adoptium"
          name: "华为云镜像"
          priority: 2
    
    global:
      mirrors:
        - url: "https://github.com/adoptium/temurin/releases"
          name: "官方源"
          priority: 1

  php:
    cn:
      mirrors:
        - url: "https://mirrors.aliyun.com/php"
          name: "阿里云镜像"
          priority: 1
    
    global:
      mirrors:
        - url: "https://www.php.net/distributions"
          name: "官方源"
          priority: 1

  rust:
    cn:
      rustup_script: "https://mirrors.tuna.tsinghua.edu.cn/rustup/rustup-init.sh"
    
    global:
      rustup_script: "https://sh.rustup.rs"

  docker:
    cn:
      mirrors:
        - url: "https://get.daocloud.io/docker"
          name: "DaoCloud 镜像"
          priority: 1
    
    global:
      mirrors:
        - url: "https://get.docker.com"
          name: "官方脚本"
          priority: 1

  github:
    cn:
      mirrors:
        - url: "https://ghproxy.com"
          name: "GH Proxy"
          priority: 1
        - url: "https://mirror.ghproxy.com"
          name: "GitHub 代理"
          priority: 2
        - url: "https://gh.api.99988866.xyz"
          name: "GitHub CDN"
          priority: 3
    
    global:
      mirrors:
        - url: "https://github.com"
          name: "官方源"
          priority: 1

